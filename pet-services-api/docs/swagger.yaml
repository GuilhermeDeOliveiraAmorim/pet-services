            $ref: '#/definitions/exceptions.ProblemDetails'
      security:
      - Bearer: []
      summary: Deleta a conta do usuário autenticado
      tags:
      - Usuários
    get:
      parameters:
      - description: Página
        in: query
        name: page
        type: integer
      - description: Limite
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
