host: localhost:8080
info:
  contact:
    email: guilherme@example.com
    name: Guilherme Amorim
  description: API para gerenciamento de serviços pet.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Pet Services API
  version: "1.0"
paths:
  /admin:
    post:
      consumes:
      - application/json
      parameters:
      - description: Dados do admin
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/usecases.CreateAdminInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/usecases.CreateAdminOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetails'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/exceptions.ProblemDetails'
      security:
      - Bearer: []
      summary: Cria um novo administrador
      tags:
      - Administração
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Dados de login
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/usecases.LoginUserInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecases.LoginUserOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetails'
      summary: Realiza login do usuário
      tags:
      - Autenticação
  /auth/logout:
    post:
      consumes:
      - application/json
      parameters:
      - description: Opções de logout
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/usecases.LogoutInputBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecases.LogoutOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetails'
      security:
      - Bearer: []
      summary: Realiza logout do usuário autenticado
      tags:
      - Autenticação
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Token de atualização
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/usecases.RefreshTokenInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecases.RefreshTokenOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetails'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/exceptions.ProblemDetails'
      summary: Renova tokens de autenticação
      tags:
      - Autenticação
  /auth/request-password-reset:
    post:
      consumes:
