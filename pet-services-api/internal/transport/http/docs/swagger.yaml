      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Complete request
      tags:
      - requests
  /requests/{request_id}/reject:
    post:
      consumes:
      - application/json
      parameters:
      - description: Request ID
        in: path
        name: request_id
        required: true
        type: string
      - description: Rejection reason
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Reject request
      tags:
      - requests
  /requests/{request_id}/status:
    get:
      parameters:
