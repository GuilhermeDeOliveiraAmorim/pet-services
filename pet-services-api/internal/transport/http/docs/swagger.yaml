basePath: /api/v1/
definitions:
  auth.LoginOutput:
    properties:
      accessExpiresAt:
        type: integer
      accessToken:
        type: string
      refreshExpiresAt:
        type: integer
      refreshToken:
        type: string
      userID:
        type: string
      userType:
        $ref: '#/definitions/user.UserType'
    type: object
  auth.RefreshOutput:
    properties:
      accessExpiresAt:
        type: integer
      accessToken:
        type: string
      refreshExpiresAt:
        type: integer
      refreshToken:
        type: string
      userID:
        type: string
      userType:
        type: string
    type: object
  auth.SignupOutput:
    properties:
      accessExpiresAt:
        type: integer
      accessToken:
        type: string
      refreshExpiresAt:
        type: integer
      refreshToken:
        type: string
      userID:
        type: string
      userType:
        $ref: '#/definitions/user.UserType'
    type: object
  exceptions.ProblemDetails:
    properties:
      detail:
        type: string
      instance:
        type: string
      status:
        type: integer
      title:
        type: string
      type:
        type: string
    type: object
  exceptions.ProblemDetailsOutputDTO:
    properties:
      problem_details:
        items:
          $ref: '#/definitions/exceptions.ProblemDetails'
        type: array
    type: object
  http.ListProvidersByLocationResponseDTO:
    properties:
      items:
        items:
          $ref: '#/definitions/provider.Provider'
        type: array
      total:
        type: integer
    type: object
  http.ListReviewsResponseDTO:
    properties:
      items:
        items:
          $ref: '#/definitions/review.Review'
        type: array
      total:
        type: integer
    type: object
  http.changePasswordRequest:
    properties:
      current_password:
        minLength: 1
        type: string
      new_password:
        maxLength: 128
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  http.confirmEmailVerificationRequest:
    properties:
      token:
        minLength: 10
        type: string
    required:
    - token
    type: object
  http.confirmPasswordResetRequest:
    properties:
      new_password:
        maxLength: 128
        minLength: 8
        type: string
      token:
        minLength: 10
        type: string
    required:
    - new_password
    - token
    type: object
  http.loginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 1
        type: string
    required:
    - email
    - password
    type: object
  http.refreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  http.requestPasswordResetRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  http.serviceRequest:
    properties:
      category:
        maxLength: 50
        minLength: 2
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
      price_max:
        type: number
      price_min:
        minimum: 0
        type: number
    required:
    - category
    - name
    - price_max
    - price_min
    type: object
  http.signupRequest:
    properties:
      email:
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
      password:
        maxLength: 128
        minLength: 8
        type: string
      phone:
        maxLength: 20
        minLength: 10
        type: string
      type:
        enum:
        - owner
        - provider
        type: string
    required:
    - email
    - name
    - password
    - phone
    - type
    type: object
  http.updateProfileRequest:
    properties:
      address:
        $ref: '#/definitions/user.Address'
      latitude:
        maximum: 90
        minimum: -90
        type: number
      longitude:
        maximum: 180
        minimum: -180
        type: number
      name:
        maxLength: 100
        minLength: 3
        type: string
      phone:
        maxLength: 20
        minLength: 10
        type: string
    type: object
  http.updateProviderProfileRequest:
    properties:
      address:
        $ref: '#/definitions/user.Address'
      business_name:
        maxLength: 150
        minLength: 3
        type: string
      description:
        maxLength: 1000
        minLength: 10
        type: string
      latitude:
        maximum: 90
        minimum: -90
        type: number
      longitude:
        maximum: 180
        minimum: -180
        type: number
      photos:
        description: URLs das novas fotos
        items:
          type: string
        type: array
      price_range:
        $ref: '#/definitions/provider.PriceRange'
    type: object
  pet-services-api_internal_domain_user.User:
    properties:
      createdAt:
        type: string
      deletedAt:
        type: string
      email:
        $ref: '#/definitions/user.Email'
      emailVerified:
        type: boolean
      id:
        type: string
      location:
        $ref: '#/definitions/user.Location'
      name:
        type: string
      password:
        description: hash bcrypt
        type: string
      phone:
        $ref: '#/definitions/user.Phone'
      type:
        $ref: '#/definitions/user.UserType'
      updatedAt:
        type: string
    type: object
  provider.ApprovalStatus:
    enum:
    - pending
    - approved
    - rejected
    type: string
    x-enum-varnames:
    - ApprovalPending
    - ApprovalApproved
    - ApprovalRejected
  provider.DaySchedule:
    properties:
      close:
        description: 'Formato: "18:00"'
        type: string
      isOpen:
        type: boolean
      open:
        description: 'Formato: "08:00"'
        type: string
    type: object
  provider.Photo:
    properties:
      createdAt:
        type: string
      id:
        type: string
      order:
        type: integer
      url:
        type: string
    type: object
  provider.PriceRange:
    enum:
    - $
    - $$
    - $$$
    type: string
    x-enum-varnames:
    - PriceRangeLow
    - PriceRangeMedium
    - PriceRangeHigh
  provider.Provider:
    properties:
      address:
        $ref: '#/definitions/user.Address'
      approvalStatus:
        $ref: '#/definitions/provider.ApprovalStatus'
      avgRating:
        type: number
      businessName:
        type: string
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      location:
        $ref: '#/definitions/user.Location'
      moderationNote:
        type: string
      photos:
        items:
          $ref: '#/definitions/provider.Photo'
        type: array
      priceRange:
        $ref: '#/definitions/provider.PriceRange'
      services:
        items:
          $ref: '#/definitions/provider.Service'
        type: array
      totalReviews:
        type: integer
      updatedAt:
        type: string
      user:
        $ref: '#/definitions/pet-services-api_internal_domain_user.User'
      userID:
        type: string
      workingHours:
        $ref: '#/definitions/provider.WorkingHours'
    type: object
  provider.RegisterProviderInput:
    properties:
      address:
        $ref: '#/definitions/user.Address'
      business_name:
        maxLength: 150
        minLength: 3
        type: string
      description:
        maxLength: 1000
        minLength: 10
        type: string
      latitude:
        maximum: 90
        minimum: -90
        type: number
      longitude:
        maximum: 180
        minimum: -180
        type: number
      photos:
        items:
          type: string
        type: array
      price_range:
        $ref: '#/definitions/provider.PriceRange'
      services:
        items:
          $ref: '#/definitions/provider.ServiceInput'
        minItems: 1
        type: array
      user_id:
        type: string
    required:
    - address
    - business_name
    - description
    - latitude
    - longitude
    - price_range
    - services
    type: object
  provider.RegisterProviderOutput:
    properties:
      business_name:
        type: string
      is_active:
        type: boolean
      provider_id:
        type: string
    type: object
  provider.Service:
    properties:
      category:
        type: string
      name:
        type: string
      photos:
        items:
          $ref: '#/definitions/provider.ServicePhoto'
        type: array
      priceMax:
        type: number
      priceMin:
        type: number
    type: object
  provider.ServiceInput:
    properties:
      category:
        maxLength: 50
        minLength: 2
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
      price_max:
        type: number
      price_min:
        minimum: 0
        type: number
    required:
    - category
    - name
    - price_max
    - price_min
    type: object
  provider.ServicePhoto:
    properties:
      createdAt:
        type: string
      id:
        type: string
      order:
        type: integer
      url:
        type: string
    type: object
  provider.WorkingHours:
    properties:
      friday:
        $ref: '#/definitions/provider.DaySchedule'
      monday:
        $ref: '#/definitions/provider.DaySchedule'
      saturday:
        $ref: '#/definitions/provider.DaySchedule'
      sunday:
        $ref: '#/definitions/provider.DaySchedule'
      thursday:
        $ref: '#/definitions/provider.DaySchedule'
      tuesday:
        $ref: '#/definitions/provider.DaySchedule'
      wednesday:
        $ref: '#/definitions/provider.DaySchedule'
    type: object
  request.CreateRequestInput:
    properties:
      notes:
        type: string
      ownerID:
        type: string
      petAge:
        type: integer
      petBreed:
        type: string
      petName:
        type: string
      petNotes:
        type: string
      petType:
        $ref: '#/definitions/request.PetType'
      petWeight:
        type: number
      preferredDate:
        type: string
      preferredTime:
        description: HH:MM
        type: string
      providerID:
        type: string
      serviceType:
        type: string
    type: object
  request.PetType:
    enum:
    - dog
    - cat
    - bird
    - rabbit
    - fish
    - rodent
    - reptile
    - other
    type: string
    x-enum-varnames:
    - PetTypeDog
    - PetTypeCat
    - PetTypeBird
    - PetTypeRabbit
    - PetTypeFish
    - PetTypeRodent
    - PetTypeReptile
    - PetTypeOther
  review.Review:
    properties:
      comment:
        type: string
      createdAt:
        type: string
      id:
        type: string
      ownerID:
        type: string
      providerID:
        type: string
      rating:
        type: integer
      requestID:
        type: string
    type: object
  review.SubmitReviewInput:
    properties:
      comment:
        type: string
      ownerID:
        type: string
      rating:
        type: integer
      requestID:
        type: string
    type: object
  user.Address:
    properties:
      city:
        type: string
      complement:
        type: string
      country:
        type: string
      district:
        type: string
      number:
        type: string
      state:
        type: string
      street:
        type: string
      zipCode:
        type: string
    type: object
  user.Email:
    type: object
  user.Location:
    properties:
      address:
        $ref: '#/definitions/user.Address'
      latitude:
        type: number
      longitude:
        type: number
    type: object
  user.Phone:
    type: object
  user.UserType:
    enum:
    - owner
    - provider
    type: string
    x-enum-varnames:
    - UserTypeOwner
    - UserTypeProvider
info:
  contact:
    email: contato@petland.com.br
    name: API Support
    url: http://www.petland.com.br
  description: This is an API for managing pet services.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Pet Services API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.LoginOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetailsOutputDTO'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      parameters:
      - description: Bearer <refresh_token>
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/exceptions.ProblemDetailsOutputDTO'
      summary: Logout
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.RefreshOutput'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/exceptions.ProblemDetailsOutputDTO'
      summary: Refresh tokens
      tags:
      - auth
  /auth/signup:
    post:
      consumes:
      - application/json
      parameters:
      - description: Signup payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.signupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/auth.SignupOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetailsOutputDTO'
      summary: Signup
      tags:
      - auth
  /providers:
    post:
      consumes:
      - application/json
      parameters:
      - description: Provider payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/provider.RegisterProviderInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/provider.RegisterProviderOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetailsOutputDTO'
      security:
      - BearerAuth: []
      summary: Register provider profile
      tags:
      - providers
  /providers/{provider_id}:
    put:
      consumes:
      - application/json
      parameters:
      - description: Provider ID
        in: path
        name: provider_id
        required: true
        type: string
      - description: Profile payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.updateProviderProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/provider.Provider'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetailsOutputDTO'
      security:
      - BearerAuth: []
      summary: Update provider profile
      tags:
      - providers
  /providers/{provider_id}/activate:
    post:
      parameters:
      - description: Provider ID
        in: path
        name: provider_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/provider.Provider'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetailsOutputDTO'
      security:
      - BearerAuth: []
      summary: Activate provider profile
      tags:
      - providers
  /providers/{provider_id}/approve:
    post:
      consumes:
      - application/json
      parameters:
      - description: Provider ID
        in: path
        name: provider_id
        required: true
        type: string
      - description: Approval note
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/provider.Provider'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetailsOutputDTO'
      security:
      - BearerAuth: []
      summary: Approve provider profile
      tags:
      - providers
  /providers/{provider_id}/deactivate:
    post:
      parameters:
      - description: Provider ID
        in: path
        name: provider_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/provider.Provider'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetailsOutputDTO'
      security:
      - BearerAuth: []
      summary: Deactivate provider profile
      tags:
      - providers
  /providers/{provider_id}/photos:
    post:
      consumes:
      - application/json
      parameters:
      - description: Provider ID
        in: path
        name: provider_id
        required: true
        type: string
      - description: Photo payload
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/provider.Provider'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetailsOutputDTO'
      security:
      - BearerAuth: []
      summary: Add photo to provider
      tags:
      - providers
  /providers/{provider_id}/photos/{photo_id}:
    delete:
      parameters:
      - description: Provider ID
        in: path
        name: provider_id
        required: true
        type: string
      - description: Photo ID
        in: path
        name: photo_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/provider.Provider'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetailsOutputDTO'
      security:
      - BearerAuth: []
      summary: Remove photo from provider
      tags:
      - providers
  /providers/{provider_id}/reject:
    post:
      consumes:
      - application/json
      parameters:
      - description: Provider ID
        in: path
        name: provider_id
        required: true
        type: string
      - description: Rejection reason
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/provider.Provider'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetailsOutputDTO'
      security:
      - BearerAuth: []
      summary: Reject provider profile
      tags:
      - providers
  /providers/{provider_id}/services:
    delete:
      consumes:
      - application/json
      parameters:
      - description: Provider ID
        in: path
        name: provider_id
        required: true
        type: string
      - description: Service identifier
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/provider.Provider'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetailsOutputDTO'
      security:
      - BearerAuth: []
      summary: Remove provider service
      tags:
      - providers
    post:
      consumes:
      - application/json
      parameters:
      - description: Provider ID
        in: path
        name: provider_id
        required: true
        type: string
      - description: Service payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.serviceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/provider.Provider'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetailsOutputDTO'
      security:
      - BearerAuth: []
      summary: Add service to provider
      tags:
      - providers
    put:
      consumes:
      - application/json
      parameters:
      - description: Provider ID
        in: path
        name: provider_id
        required: true
        type: string
      - description: Service payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.serviceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/provider.Provider'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetailsOutputDTO'
      security:
      - BearerAuth: []
      summary: Update provider service
      tags:
      - providers
  /providers/{provider_id}/working-hours:
    put:
      consumes:
      - application/json
      parameters:
      - description: Provider ID
        in: path
        name: provider_id
        required: true
        type: string
      - description: Working hours payload
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/provider.Provider'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetailsOutputDTO'
      security:
      - BearerAuth: []
      summary: Update provider working hours
      tags:
      - providers
  /providers/{provider_id}/working-hours/day:
    put:
      consumes:
      - application/json
      parameters:
      - description: Provider ID
        in: path
        name: provider_id
        required: true
        type: string
      - description: Day schedule payload
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/provider.Provider'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetailsOutputDTO'
      security:
      - BearerAuth: []
      summary: Update provider day schedule
      tags:
      - providers
  /providers/search/location:
    get:
      parameters:
      - description: Latitude
        in: query
        name: lat
        required: true
        type: number
      - description: Longitude
        in: query
        name: lon
        required: true
        type: number
      - description: Raio em km
        in: query
        name: radius_km
        required: true
        type: number
      - description: Página
        in: query
        name: page
        type: integer
      - description: Limite
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.ListProvidersByLocationResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetailsOutputDTO'
      summary: List providers by location
      tags:
      - providers
  /providers/services/{service_id}/photos:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Service ID
        in: path
        name: service_id
        required: true
        type: string
      - description: Service photo file
        in: formData
        name: photo
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/exceptions.ProblemDetailsOutputDTO'
        "500":
          description: Internal Server Error
